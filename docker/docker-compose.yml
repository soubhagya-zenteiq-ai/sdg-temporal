version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: md_postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: md_pipeline
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  temporal:
    image: temporalio/auto-setup:latest
    container_name: temporal
    depends_on:
      - postgres
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=user
      - POSTGRES_PWD=password
      - POSTGRES_SEEDS=postgres

  temporal-ui:
    image: temporalio/ui:latest
    container_name: temporal_ui
    depends_on:
      - temporal
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233

  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: md_worker
    depends_on:
      - postgres
      - temporal
    env_file:
      - ../.env
    environment:
      - DB_HOST=postgres
      - TEMPORAL_HOST=temporal:7233
    volumes:
      - ../models:/app/models
      - ..:/app
    command: ["python", "app/workers/worker.py"]

volumes:
  pg_data: